name: Build macOS App

on:
  workflow_dispatch:

jobs:
  build-mac:
    # GitHub's Intel (macos-13) hosted runners are effectively unavailable
    # (jobs sit queued indefinitely) - arm64 covers every Mac sold since
    # late 2020, which is the practical target now.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      # Bundles the browser into node_modules so the packaged app doesn't
      # need a separate Playwright install on the machine that runs it -
      # PLAYWRIGHT_BROWSERS_PATH=0 makes it install alongside playwright-core
      # instead of in the global cache. Only the regular Chromium build is
      # kept; this app never launches headless-shell or records video.
      - name: Download Chromium for bundling
        env:
          PLAYWRIGHT_BROWSERS_PATH: "0"
        run: npx playwright install chromium

      - name: Trim unused browser variants
        run: |
          rm -rf node_modules/playwright-core/.local-browsers/chromium_headless_shell-*
          rm -rf node_modules/playwright-core/.local-browsers/ffmpeg-*

      # config/portal.json is gitignored (it has real Safari Portal URLs and
      # selectors, and this repo is public), so it never reaches the runner
      # via checkout. Write it from a repository secret instead, right before
      # packaging, so it ends up bundled the same way the Windows build gets
      # it from the local filesystem.
      - name: Write portal config
        env:
          PORTAL_JSON: ${{ secrets.PORTAL_JSON }}
        run: |
          if [ -z "$PORTAL_JSON" ]; then
            echo "PORTAL_JSON secret is not set - skipping, app will ship without a pre-filled config."
          else
            echo "$PORTAL_JSON" > config/portal.json
          fi

      - name: Build macOS app
        run: npm run dist:mac

      - uses: actions/upload-artifact@v4
        with:
          name: safari-bot-mac-arm64
          path: dist/*.dmg
